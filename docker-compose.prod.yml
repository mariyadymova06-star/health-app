services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: health_db
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/mariyadymova06-star/health-app-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://health_user:health_pass@db:5432/health_db
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: '["http://localhost"]'
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/mariyadymova06-star/health-app-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
