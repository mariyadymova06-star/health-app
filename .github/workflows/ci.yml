name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  frontend-build:
    name: Сборка фронтенда
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Установка зависимостей
        run: npm ci
        working-directory: frontend

      - name: Сборка проекта
        run: npm run build
        working-directory: frontend

  backend-check:
    name: Проверка бэкенда
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Установка зависимостей
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Проверка запуска приложения
        run: python -c "from app.main import app; print('OK')"
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost/db
          SECRET_KEY: test-secret-key-for-ci

  build:
    name: Build · ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            dockerfile: backend/Dockerfile

          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.service }}
          cache-to: type=gha,scope=build-${{ matrix.service }},mode=max

  all-built:
    name: All images built
    runs-on: ubuntu-latest
    needs: build
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ One or more images failed to build"
            exit 1
          fi
          echo "✅ All images built successfully"

  deploy:
    name: Deploy to VDS
    runs-on: ubuntu-latest
    needs: all-built
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/health-app"

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            cd /opt/health-app

            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env

            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u mariyadymova06-star --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            docker image prune -f
            echo "✅ Deploy completed"
